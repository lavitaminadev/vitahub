version: '3.8'
services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: vitahub_root
      MYSQL_DATABASE: vitahub
      MYSQL_USER: vitahub
      MYSQL_PASSWORD: vitahub_secret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../database/seeds/seed.sql:/docker-entrypoint-initdb.d/seed.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: infrastructure/deployment/Dockerfile.api
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: vitahub
      DB_PASSWORD: vitahub_secret
      DB_DATABASE: vitahub
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: change_me_in_production
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: infrastructure/deployment/Dockerfile.web
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  mysql_data:
